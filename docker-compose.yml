services:
  keycrack:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - bug-data:/app/data
    environment:
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-changeme}
      # Uncomment to use PostgreSQL instead of SQLite:
      # - DATABASE_URL=postgresql://keycrack:keycrack@db:5432/keycrack
    # depends_on:
    #   db:
    #     condition: service_healthy
    restart: unless-stopped

  # Uncomment for local PostgreSQL testing:
  # db:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: keycrack
  #     POSTGRES_PASSWORD: keycrack
  #     POSTGRES_DB: keycrack
  #   volumes:
  #     - pg-data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U keycrack"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 5

volumes:
  bug-data:
  # pg-data:
