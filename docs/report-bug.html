<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeyCrack - Report a Bug</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='10' cy='10' r='7' fill='none' stroke='%2300ff41' stroke-width='2.5'/><rect x='15' y='8.5' width='14' height='3' rx='1' fill='%2300ff41'/><rect x='24' y='11.5' width='3' height='5' rx='0.5' fill='%2300ff41'/><rect x='19' y='11.5' width='3' height='4' rx='0.5' fill='%2300ff41'/></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        body {
            font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
            background: #000000;
            color: #00ff41;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 30%, rgba(0, 0, 0, 0.6) 100%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15) 0px,
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 3px
            );
            z-index: 9999;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.25rem;
            color: #00ff41;
        }

        .subtitle {
            color: #00aa2a;
            margin-bottom: 2rem;
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(10px);
            background: rgba(0, 170, 42, 0.15);
            border: 0.5px solid rgba(0, 170, 42, 0.3);
            padding: 0.3rem 0.6rem;
        }

        .card {
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #00ff41;
            border-radius: 0;
            padding: 2rem;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.15), 0 0 60px rgba(0, 255, 65, 0.05);
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: #00aa2a;
            margin-bottom: 0.3rem;
            margin-top: 1rem;
        }

        label:first-of-type { margin-top: 0; }

        input, select, textarea {
            width: 100%;
            padding: 0.6rem 0.8rem;
            background: #0a0a0a;
            border: 1px solid #003b00;
            border-radius: 0;
            color: #00ff41;
            font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
            font-size: 0.95rem;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #00ff41;
            box-shadow: 0 0 5px rgba(0, 255, 65, 0.3);
        }

        input::placeholder, textarea::placeholder { color: #003b00; }

        select option {
            background: #0a0a0a;
            color: #00ff41;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .optional { color: #009200; font-size: 0.8rem; }

        .char-counter {
            text-align: right;
            font-size: 0.75rem;
            color: #003b00;
            margin-top: 0.2rem;
        }

        .char-counter.warning { color: #ff3333; }

        button {
            font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
            border-radius: 0;
            cursor: pointer;
        }

        .btn-primary {
            margin-top: 1.5rem;
            width: 100%;
            padding: 0.7rem;
            background: transparent;
            color: #00ff41;
            border: 1px solid #00ff41;
            font-size: 1rem;
        }

        .btn-primary:hover {
            background: #00ff41;
            color: #000000;
        }

        .btn-primary:disabled {
            border-color: #003b00;
            color: #003b00;
            cursor: not-allowed;
            background: transparent;
        }

        .error {
            margin-top: 1rem;
            padding: 0.7rem;
            background: #0a0a0a;
            border: 1px solid #ff3333;
            border-radius: 0;
            color: #ff3333;
            display: none;
        }

        .success {
            margin-top: 1rem;
            padding: 0.7rem;
            background: #0a0a0a;
            border: 1px solid #00ff41;
            border-radius: 0;
            color: #00ff41;
            display: none;
        }

        .back-link {
            margin-top: 1.5rem;
            text-align: center;
        }

        .back-link a {
            color: #00aa2a;
            font-size: 0.85rem;
            text-decoration: none;
        }

        .back-link a:hover { color: #00ff41; }
    </style>
</head>
<body>
    <canvas id="matrix-bg"></canvas>
    <h1>Report a Bug</h1>
    <p class="subtitle">// Help us improve KeyCrack</p>

    <div class="card">
        <form id="bug-form" autocomplete="off">
            <label for="category">&gt; Category</label>
            <select id="category">
                <option value="UI issue">UI issue</option>
                <option value="Passwords Issue">Passwords Issue</option>
                <option value="Crash">Crash</option>
                <option value="Other" selected>Other</option>
            </select>

            <label for="description">&gt; Description</label>
            <textarea id="description" required placeholder="Describe the bug..." maxlength="500"></textarea>
            <div class="char-counter" id="char-counter">0 / 500</div>

            <label for="contact">&gt; Contact <span class="optional">(optional)</span></label>
            <input type="text" id="contact" placeholder="email or @github">

            <button type="submit" id="btn" class="btn-primary">[ SUBMIT REPORT ]</button>
        </form>
        <div class="error" id="error"></div>
        <div class="success" id="success"></div>
    </div>

    <div class="back-link">
        <a href="index.html">[ Back to KeyCrack ]</a>
    </div>

    <script src="supabase-config.js"></script>
    <script>
        (function() {
            const canvas = document.getElementById("matrix-bg");
            const ctx = canvas.getContext("2d");
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*(){}[]|;:<>?/~";
            const charArray = chars.split("");
            let rows = [];
            const ROW_HEIGHT = 18;
            const BASE_SPEED = 1.5;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                initRows();
            }

            function initRows() {
                const numRows = Math.floor(canvas.height / ROW_HEIGHT);
                rows = [];
                for (let i = 0; i < numRows; i++) {
                    rows.push({
                        y: i * ROW_HEIGHT + ROW_HEIGHT / 2,
                        x: -Math.random() * canvas.width,
                        speed: BASE_SPEED + Math.random() * 1.5,
                        opacity: 0.25 + Math.random() * 0.15,
                        text: generateText(Math.floor(canvas.width / 10) + 20),
                        fontSize: Math.floor(10 + Math.random() * 4),
                    });
                }
            }

            function generateText(len) {
                let t = "";
                for (let i = 0; i < len; i++) {
                    t += charArray[Math.floor(Math.random() * charArray.length)];
                }
                return t;
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (const row of rows) {
                    ctx.font = row.fontSize + "px monospace";
                    ctx.fillStyle = "rgba(0, 255, 65, " + row.opacity + ")";
                    ctx.fillText(row.text, row.x, row.y);
                    row.x += row.speed;
                    const textWidth = row.text.length * (row.fontSize * 0.6);
                    if (row.x > canvas.width + 50) {
                        row.x = -textWidth;
                        row.text = generateText(row.text.length);
                        row.speed = BASE_SPEED + Math.random() * 1.5;
                        row.opacity = 0.25 + Math.random() * 0.15;
                    }
                }
                requestAnimationFrame(draw);
            }

            window.addEventListener("resize", resize);
            resize();
            draw();
        })();
    </script>

    <script>
        const form = document.getElementById("bug-form");
        const btn = document.getElementById("btn");
        const errorDiv = document.getElementById("error");
        const successDiv = document.getElementById("success");
        const descInput = document.getElementById("description");
        const charCounter = document.getElementById("char-counter");

        descInput.addEventListener("input", () => {
            const len = descInput.value.length;
            charCounter.textContent = len + " / 500";
            charCounter.classList.toggle("warning", len >= 450);
        });

        // Submit bug report via Supabase REST API
        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            errorDiv.style.display = "none";
            successDiv.style.display = "none";
            btn.disabled = true;
            btn.textContent = "[ SUBMITTING... ]";

            const description = descInput.value;
            const category = document.getElementById("category").value;
            const contact = document.getElementById("contact").value.trim();

            try {
                await submitBug(description, category, contact || null);
                successDiv.textContent = "> Bug report submitted. Thank you!";
                successDiv.style.display = "block";
                form.reset();
                charCounter.textContent = "0 / 500";
                charCounter.classList.remove("warning");
            } catch (err) {
                errorDiv.textContent = "> ERROR: " + err.message;
                errorDiv.style.display = "block";
            } finally {
                btn.disabled = false;
                btn.textContent = "[ SUBMIT REPORT ]";
            }
        });
    </script>
</body>
</html>
