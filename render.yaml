services:
  - type: web
    name: keycrack
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: keycrack-db
          property: connectionString
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false

databases:
  - name: keycrack-db
    plan: free
    databaseName: keycrack
    user: keycrack
